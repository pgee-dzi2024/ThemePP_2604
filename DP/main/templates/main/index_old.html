<!DOCTYPE html>
<html lang="bg">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитален скенер - Дипломен проект</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Локален CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-light">

<main id="app" class="container mt-5">

    <header class="text-center mb-5">
        <h2>Дигитален скенер (OCR)</h2>
    </header>

    <section class="row">

        <!-- Лява колона: Качване на документ -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Качване на документ</h5>
                    <div class="mb-3">
                        <input class="form-control" type="file" @change="onFileChange" accept="image/*">
                    </div>

                    <div v-if="previewUrl" class="mb-3 text-center">
                        <img :src="previewUrl" alt="Preview на документа" class="img-fluid rounded" style="max-height: 300px;">
                    </div>

                    <button class="btn btn-primary w-100" @click="uploadDocument" :disabled="!selectedFile || isLoading">
                        <span v-if="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                        <span v-else>Сканирай и извлечи текст</span>
                    </button>

                    <div v-if="errorMessage" class="alert alert-danger mt-3">
                        [[ errorMessage ]]
                    </div>
                </div>
            </div>
        </div>

        <!-- Дясна колона: Резултат и редакция -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Извлечен текст (Редакция)</h5>
                    <div v-if="!extractedText && !isLoading" class="text-muted flex-grow-1 d-flex align-items-center justify-content-center">
                        Текстът ще се появи тук след сканиране...
                    </div>
                    <textarea v-if="extractedText || isLoading"
                              v-model="extractedText"
                              class="form-control flex-grow-1 mb-3"
                              rows="10"
                              :disabled="isLoading"
                              placeholder="Извлеченият текст..."></textarea>
                </div>
            </div>
        </div>

    </section>

</main>

<!-- Vue.js + Axios -->
<script src="https://unpkg.com/vue@3/dist/vue.global.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js" defer></script>

<!-- Локален JS -->
<script src="{% static 'js/app.js' %}" defer></script>

</body>
</html>
