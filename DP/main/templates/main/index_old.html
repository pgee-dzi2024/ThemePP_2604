<!DOCTYPE html>
<html lang="bg">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитален скенер - Дипломен проект</title>

    <!-- Bootstrap CSS за адаптивен дизайн -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Vue.js 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script src="{% static 'main/js/app.js' %}"></script>
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
</head>
<body class="bg-light">

<div id="app" class="container mt-5">
    <h2 class="text-center mb-4">Дигитален скенер (OCR)</h2>

    <div class="row">

        <!-- Лява колона: Качване на документ -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Качване на документ</h5>

                    <div class="mb-3">
                        <input class="form-control" type="file" @change="onFileChange" accept="image/*">
                    </div>

                    <!-- Преглед на избраната снимка -->
                    <div v-if="previewUrl" class="mb-3 text-center">
                        <img :src="previewUrl" alt="Preview" class="img-fluid rounded" style="max-height: 300px;">
                    </div>

                    <button class="btn btn-primary w-100" @click="uploadDocument" :disabled="!selectedFile || isLoading">
                        <span v-if="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                        <span v-else>Сканирай и извлечи текст</span>
                    </button>

                    <div v-if="errorMessage" class="alert alert-danger mt-3">
                        {{ errorMessage }}
                    </div>
                </div>
            </div>
        </div>

        <!-- Дясна колона: Резултат и редакция -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Извлечен текст (Редакция)</h5>

                    <div v-if="!extractedText && !isLoading" class="text-muted flex-grow-1 d-flex align-items-center justify-content-center">
                        Текстът ще се появи тук след сканиране...
                    </div>

                    <textarea v-if="extractedText || isLoading"
                              v-model="extractedText"
                              class="form-control flex-grow-1"
                              rows="10"
                              :disabled="isLoading"
                              placeholder="Извлеченият текст..."></textarea>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    const { createApp, ref } = Vue;

    createApp({
        setup() {
            const selectedFile = ref(null);
            const previewUrl = ref(null);
            const extractedText = ref('');
            const isLoading = ref(false);
            const errorMessage = ref('');

            // При избиране на файл
            const onFileChange = (event) => {
                const file = event.target.files[0];
                if (file) {
                    selectedFile.value = file;
                    previewUrl.value = URL.createObjectURL(file);
                    extractedText.value = ''; // Изчистваме стария текст
                    errorMessage.value = '';
                }
            };

            // Изпращане към бекенда
            const uploadDocument = async () => {
                if (!selectedFile.value) return;

                isLoading.value = true;
                errorMessage.value = '';

                // Използваме FormData, защото изпращаме файл
                const formData = new FormData();
                formData.append('image', selectedFile.value);

                try {
                    // Изпращаме POST заявка към създадения API endpoint
                    const response = await axios.post('/api/upload/', formData, {
                        headers: {
                            'Content-Type': 'multipart/form-data'
                        }
                    });

                    // Задаваме извлечения текст в текстовото поле
                    extractedText.value = response.data.extracted_text;

                } catch (error) {
                    console.error(error);
                    errorMessage.value = "Възникна грешка при обработката на изображението.";
                } finally {
                    isLoading.value = false;
                }
            };

            return {
                selectedFile,
                previewUrl,
                extractedText,
                isLoading,
                errorMessage,
                onFileChange,
                uploadDocument
            };
        }
    }).mount('#app');
</script>

</body>
</html>
